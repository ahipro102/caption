<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Mầm non Aqua</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 5rem auto;
      background: var(--card-bg);
      padding: 2rem;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-lg);
    }
    .error-msg {
      color: #dc3545;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <header class="app-header" style="margin-bottom: 1.5rem;">
      <div class="logo">
        <i class="fa-solid fa-children"></i>
      </div>
      <h1 style="font-size: 1.8rem;">Mầm non Aqua</h1>
      <p style="font-size: 0.9rem;">Đăng nhập để sử dụng AI</p>
    </header>

    <div id="errorMsg" class="error-msg">Sai tên đăng nhập hoặc mật khẩu!</div>

    <form id="loginForm">
      <div class="input-group">
        <label for="username"><i class="fa-solid fa-user"></i> Tên đăng nhập</label>
        <input type="text" id="username" required placeholder="Nhập tài khoản...">
      </div>

      <div class="input-group">
        <label for="password"><i class="fa-solid fa-lock"></i> Mật khẩu</label>
        <input type="password" id="password" required placeholder="Nhập mật khẩu...">
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
        <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập
      </button>
    </form>
  </div>
  <script src="login.js"></script>
</body>
</html>
