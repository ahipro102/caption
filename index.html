<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo Caption Facebook - Mầm non Aqua</title>
  <script>
    // Kiểm tra xem đã đăng nhập chưa
    if (sessionStorage.getItem('isAuthenticated') !== 'true') {
      window.location.href = 'login.html';
    }
  </script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header" style="position: relative;">
      <button id="logoutBtn" class="btn btn-secondary" style="position: absolute; top: 0; right: 0; padding: 0.5rem 1rem; flex: none;">
        <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
      </button>
      <div class="logo">
        <i class="fa-solid fa-children"></i>
      </div>
      <h1>Mầm non Aqua</h1>
      <p>Trợ lý AI viết Caption Facebook</p>
    </header>

    <main class="app-content">
      <section class="main-form">
        <div class="input-group full-width">
          <label for="content"><i class="fa-solid fa-pen"></i> Nội dung bài viết / Chủ đề *</label>
          <textarea id="content" rows="4" placeholder="Ví dụ: Hôm nay các bé lớp mầm 1 học làm bánh trung thu, bé nào cũng vui vẻ hào hứng..." required></textarea>
        </div>

        <div class="input-group full-width">
          <label for="requirements"><i class="fa-solid fa-list-check"></i> Yêu cầu thêm</label>
          <input type="text" id="requirements" placeholder="Ví dụ: Giọng điệu vui tươi, nhí nhảnh, nhiều biểu tượng cảm xúc...">
        </div>

        <div class="input-row">
          <div class="input-group">
            <label for="minCharLimit"><i class="fa-solid fa-text-width"></i> Ký tự (Tối thiểu)</label>
            <input type="number" id="minCharLimit" placeholder="VD: 100" value="100" min="50" max="1000">
          </div>

          <div class="input-group">
            <label for="charLimit"><i class="fa-solid fa-text-width"></i> Ký tự (Tối đa)</label>
            <input type="number" id="charLimit" placeholder="VD: 500" value="500" min="100" max="2000">
          </div>
          
          <div class="input-group">
            <label for="numCaptions"><i class="fa-solid fa-layer-group"></i> Số lượng Caption</label>
            <input type="number" id="numCaptions" value="3" min="1" max="5">
          </div>
        </div>

        <div class="action-buttons">
          <button id="generateBtn" class="btn btn-primary">
            <i class="fa-solid fa-wand-magic-sparkles"></i> <span>Tạo Caption</span>
          </button>
          <button id="stopBtn" class="btn btn-secondary hidden" style="background-color: #dc3545; color: white;">
            <i class="fa-solid fa-stop"></i> Dừng lại
          </button>
          <button id="regenerateBtn" class="btn btn-secondary hidden">
            <i class="fa-solid fa-rotate-right"></i> Tạo lại
          </button>
        </div>
      </section>

      <section class="results-container" id="resultsContainer">
        <!-- Results will be injected here -->
      </section>
      
      <div id="loading" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>AI đang suy nghĩ và viết bài...</p>
      </div>
    </main>
  </div>
  <script src="main.js"></script>
</body>
</html>
